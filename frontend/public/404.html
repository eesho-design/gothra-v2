<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Gothra — Redirecting</title>
    <script>
      // GitHub Pages SPA redirect — handles React Router client-side routing
      // Converts the path into a query string and redirects to index.html
      var pathSegmentsToKeep = 1; // '/gothra-v2/' = 1 segment
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
