services:
  - type: web
    name: gothra-v2-api
    runtime: node
    buildCommand: npm install && cd frontend && npm install && npm run build
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: MONGODB_URL
        sync: false
      - key: STRIPE_API_KEY
        sync: false
